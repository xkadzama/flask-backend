<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Главная страница</title>
</head>
<body>
<h1>Сайт для создания задач</h1>
{% if current_user.is_authenticated %}
    <a href="{{ url_for('profile.profile') }}"> ({{ current_user.username }}) </a><br>
    <a href="{{ url_for('tasks.get_all_tasks') }}">Мои задачи</a>
    <a href="{{ url_for('auth.logout') }}">Выйти</a>
{% else %}
    <a href="{{ url_for('auth.login') }}">Войти</a>
    <a href="{{ url_for('auth.register') }}">Регистрация</a>
{% endif %}
</body>
</html>
