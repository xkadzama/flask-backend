<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Все задачи</title>
</head>
<body>
{% if tasks_db %}
    {% for task in tasks_db %}
        <h3> <a href="{{ url_for('tasks.task_detail', id=task.id) }}"> {{ task.title }} </a></h3>
        <p>{{ task.description }}</p>
        <hr>
    {% endfor %}
{% else %}
    <h3> Задачи отсутствуют! </h3>
{% endif %}

</body>
</html>
